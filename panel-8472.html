<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Admin – El Buen Sabor</title>
  <meta name="robots" content="noindex, nofollow"/>
  <meta property="og:title"   content="El Buen Sabor – Delivery GRATIS en Moyobamba"/>
  <meta property="og:image"   content="https://elbuen-sabor-oficial.netlify.app/img/og-banner.jpg"/>
  <meta property="og:url"     content="https://elbuen-sabor-oficial.netlify.app/"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="admin-page">

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🍽️</div>
    <h2>El Buen Sabor</h2>
    <p>Acceso al panel de administración</p>
    <div class="field">
      <label>Contraseña</label>
      <div class="pwd-wrap">
        <input id="loginInput" type="password" placeholder="Ingresa la contraseña"
               autocomplete="current-password"/>
        <button class="eye-btn" id="eyeBtn" type="button">
          <i class="fa-solid fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>
    <p class="login-err hidden" id="loginErr">
      <i class="fa-solid fa-triangle-exclamation"></i> Contraseña incorrecta
    </p>
    <button class="btn-login" id="btnLogin">
      <i class="fa-solid fa-right-to-bracket"></i> Ingresar
    </button>
  </div>
</div>

<!-- PANEL -->
<div class="admin-layout hidden" id="adminLayout">
  <aside class="admin-sidebar">
    <div class="sb-brand">
      <span class="sb-icon">🍽️</span>
      <div>
        <span class="sb-name">El Buen Sabor</span>
        <span class="sb-sub">Panel Admin</span>
      </div>
    </div>
    <nav class="sb-nav">
      <a href="#" class="sb-link active">
        <i class="fa-solid fa-utensils"></i> Productos
      </a>
      <a href="index.html" target="_blank" class="sb-link">
        <i class="fa-solid fa-store"></i> Ver tienda
      </a>
      <a href="#" class="sb-link danger" id="btnLogout">
        <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
      </a>
    </nav>
    <div class="sb-stats" id="sbStats"></div>
  </aside>

  <main class="admin-main">
    <div class="admin-bar">
      <div>
        <h1 class="admin-title">Gestión de Productos</h1>
        <p class="admin-sub">Crea, edita, activa/desactiva en tiempo real</p>
      </div>
      <!-- btn-save se oculta por JS; btnNuevoPlato se inyecta por JS -->
      <button class="btn-save" id="btnSave" style="display:none">
        <i class="fa-solid fa-floppy-disk"></i> Guardar todo
      </button>
    </div>

    <div class="admin-filters" id="adminFilters">
      <button class="af-btn active" data-acat="all">Todos</button>
      <button class="af-btn" data-acat="menu">Menú del Día</button>
      <button class="af-btn" data-acat="postre">Postres</button>
      <button class="af-btn" data-acat="jugos">Jugos</button>
      <button class="af-btn" data-acat="broaster">Broaster</button>
    </div>

    <div class="admin-grid" id="adminGrid"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- ══ admin.js como module para soportar imports de Firebase ══ -->
<script type="module" src="js/admin.js"></script>
</body>
</html>
